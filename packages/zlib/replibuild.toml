[project]
name = "zlib"
version = "1.3.1"
root = "."

[dependencies.zlib]
type = "git"
url = "https://github.com/madler/zlib.git"
tag = "v1.3.1"
exclude = ["test", "examples", "contrib", "doc", "amiga", "msdos", "os400", "qnx", "watcom", "win32"]

[compile]
flags = ["-O2", "-fPIC", "-DHAVE_UNISTD_H", "-D_LARGEFILE64_SOURCE=1", "-DHAVE_HIDDEN"]

[link]
enable_lto = true
optimization_level = "2"

[binary]
type = "shared"

[wrap]
language = "c"
shim_headers = ["zlib.h"]

# Init macros append ZLIB_VERSION + sizeof(z_stream) to the real _-suffixed symbols
[wrap.macros.deflateInit]
ret = "int"
args = ["z_stream*", "int"]

[wrap.macros.inflateInit]
ret = "int"
args = ["z_stream*"]

[wrap.macros.deflateInit2]
ret = "int"
args = ["z_stream*", "int", "int", "int", "int", "int"]

[wrap.macros.inflateInit2]
ret = "int"
args = ["z_stream*", "int"]

[wrap.macros.inflateBackInit]
ret = "int"
args = ["z_stream*", "int", "unsigned char*"]

[wrap.varargs]
gzprintf = [
    ["Any", "Cstring", "Cint"],
    ["Any", "Cstring", "Cdouble"],
    ["Any", "Cstring", "Cstring"],
]

[types]
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[cache]
enabled = true
